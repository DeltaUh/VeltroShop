          React.createElement('h1', { className:'text-5xl md:text-7xl font-black mb-6 text-glow' }, p.name),
          React.createElement('p', { className:'text-xl text-white/70 leading-relaxed mb-8' }, p.desc),
          React.createElement('div', { className:'grid grid-cols-2 gap-4 mb-10' },
            React.createElement('div', { className:'glass rounded-xl p-4' },
              React.createElement('p', { className:'text-white/50 text-sm mb-1' }, 'Объём'),
              React.createElement('p', { className:'text-xl font-bold' }, p.volume)
            ),
            React.createElement('div', { className:'glass rounded-xl p-4' },
              React.createElement('p', { className:'text-white/50 text-sm mb-1' }, 'Никотин'),
              React.createElement('p', { className:'text-xl font-bold' }, p.nicotine)
            )
          ),
          React.createElement('div', { className:'mt-auto flex items-center justify-between gap-6' },
            React.createElement('span', { className:'text-5xl font-black text-red-500 text-glow' }, p.price + ' ₽'),
            React.createElement(motion.button, { onClick: () => { addToCart(p); setPage('cart'); if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success'); },
              whileHover: { scale: 1.05 }, whileTap: { scale: 0.95 },
              className:'px-10 py-5 rounded-xl text-xl font-bold glass-btn' }, 'Добавить в склеп')
          )
        )
      )
    )
  );
}

function Cart({ cart, setCart, setPage }) {
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const removeItem = (id) => setCart(cart.filter(i => i.id !== id));
  const updateQty = (id, delta) => {
    setCart(cart.map(i => i.id === id ? {...i, qty: Math.max(0, i.qty + delta)} : i).filter(i => i.qty > 0));
  };
  const checkout = () => {
    const orderData = JSON.stringify({
      items: cart.map(i => ({name: i.name, qty: i.qty, price: i.price})),
      total: total,
      userId: tg?.initDataUnsafe?.user?.id || 'unknown',
      userName: tg?.initDataUnsafe?.user?.first_name || 'Аноним',
      date: new Date().toISOString()
    });
    if (tg) {
      tg.sendData(orderData); // Отправит заказ боту и закроет WebApp
    } else {
      alert('Заказ оформлен! (В реальном Telegram здесь бы открылся чат с ботом)');
    }
  };

  return React.createElement('div', { className:'min-h-screen bg-black text-white' },
    React.createElement(Navbar, { cart: cart, setPage }),
    React.createElement('main', { className:'max-w-5xl mx-auto px-6 py-16' },
      React.createElement('p', { className:'text-red-500 font-semibold mb-3 tracking-widest uppercase' }, '— Ваш склеп —'),
      React.createElement('h1', { className:'text-5xl md:text-7xl font-black mb-12 text-glow' }, 'Камера ', React.createElement('span', { className:'text-red-600' }, 'хранения')),
      cart.length === 0
        ? React.createElement('div', { className:'glass rounded-3xl p-20 text-center' },
            React.createElement('div', { className:'text-7xl mb-6' }, '⚰️'),
            React.createElement('p', { className:'text-2xl text-white/60' }, 'Ваш склеп пуст. Выберите эликсир, чтобы начать ритуал.'),
            React.createElement(motion.button, { onClick: () => setPage('catalog'), whileHover: { scale: 1.05 }, whileTap: { scale: 0.95 },
              className:'mt-8 px-10 py-4 rounded-xl text-lg font-bold glass-btn' }, 'К эликсирам')
          )
        : React.createElement(React.Fragment, null,
            React.createElement('div', { className:'space-y-4 mb-12' },
              cart.map(item =>
                React.createElement(motion.div, { key: item.id, layout: true, initial: { opacity: 0, x: -20 }, animate: { opacity: 1, x: 0 },
                  className:'glass rounded-2xl p-6 flex items-center gap-6 flex-wrap' },
                  React.createElement('div', { className:'text-5xl' }, item.icon),
                  React.createElement('div', { className:'flex-1 min-w-[150px]' },
                    React.createElement('h3', { className:'text-xl font-bold' }, item.name),
                    React.createElement('p', { className:'text-white/50' }, item.type)
                  ),
                  React.createElement('div', { className:'flex items-center gap-3' },
                    React.createElement('button', { onClick: () => updateQty(item.id, -1), className:'w-10 h-10 rounded-lg border border-white/20 hover:border-white/50 text-white' }, '−'),
                    React.createElement('span', { className:'text-xl font-bold w-8 text-center' }, item.qty),
                    React.createElement('button', { onClick: () => updateQty(item.id, 1), className:'w-10 h-10 rounded-lg border border-white/20 hover:border-white/50 text-white' }, '+')
                  ),
                  React.createElement('div', { className:'text-2xl font-bold text-red-500 w-32 text-right' }, (item.price * item.qty) + ' ₽'),
                  React.createElement('button', { onClick: () => removeItem(item.id), className:'text-white/40 hover:text-red-500 text-2xl transition-colors' }, '×')
                )
              )
            ),
            React.createElement('div', { className:'glass rounded-3xl p-10' },
              React.createElement('div', { className:'flex justify-between items-center mb-6 flex-wrap gap-4' },
                React.createElement('span', { className:'text-2xl text-white/70' }, 'Итого к оплате:'),
                React.createElement('span', { className:'text-5xl font-black text-red-500 text-glow' }, total + ' ₽')
              ),
              React.createElement('p', { className:'text-white/40 mb-6 text-sm' }, '+ 25 капель крови будет добавлено в вашу коллекцию'),
              React.createElement(motion.button, { onClick: checkout, whileHover: { scale: 1.02 }, whileTap: { scale: 0.98 },
                className:'w-full py-6 rounded-xl text-2xl font-bold glass-btn' }, 'Оформить ритуал')
            )
          )
    )
  );
}

function App() {
  const { page } = useStore();
  const [cart, setCart] = React.useState([]);
  const [selectedProduct, setSelectedProduct] = React.useState(null);

  const addToCart = (p) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === p.id);
      return existing
        ? prev.map(i => i.id === p.id ? {...i, qty: i.qty+1} : i)
        : [...prev, {...p, qty:1}];
    });
    state.cart = cart; // синхронизация
  };
  state.cart = cart;

  const setPage = (p) => setState({page: p});

  return React.createElement(AnimatePresence, { mode: 'wait' },
    page === 'ageGate' && React.createElement(motion.div, { key:'age', initial:{opacity:0}, animate:{opacity:1}, exit:{opacity:0} },
      React.createElement(AgeGate, { onEnter: () => setPage('home') })
    ),
    page !== 'ageGate' && React.createElement(motion.div, { key:'main', initial:{opacity:0}, animate:{opacity:1}, exit:{opacity:0}, className:'min-h-screen bg-black text-white' },
      page === 'home' && React.createElement(Home, { setPage, setSelectedProduct }),
      page === 'catalog' && React.createElement(Catalog, { setPage, setSelectedProduct, addToCart }),
      page === 'product' && React.createElement(Product, { product: selectedProduct, setPage, addToCart }),
      page === 'cart' && React.createElement(Cart, { cart, setCart, setPage })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
